<!DOCTYPE html>
<html>
<head>
  <title>Employee Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body { 
      font-family: 'Poppins', sans-serif; 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      margin: 0; 
      padding: 20px;
    }
    .container { 
      max-width: 1100px; 
      margin: 0 auto; 
      background: white; 
      border-radius: 16px; 
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 30px;
    }
    h2 { color: #333; margin-top: 0; }
    h3 { color: #555; margin-bottom: 15px; }
    
    #loginForm {
      max-width: 400px;
      margin: 80px auto;
      padding: 40px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    #loginForm h2 { text-align: center; color: #667eea; }
    
    input { 
      width: 100%;
      padding: 12px 16px; 
      margin: 8px 0; 
      border: 2px solid #e0e0e0; 
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Poppins', sans-serif;
      transition: border 0.2s;
    }
    input:focus { 
      outline: none; 
      border-color: #667eea; 
    }
    
    .form-row { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
      gap: 10px; 
      margin-bottom: 10px;
    }
    
    button { 
      padding: 12px 24px; 
      margin: 5px 5px 5px 0; 
      border: none; 
      border-radius: 8px; 
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      font-family: 'Poppins', sans-serif;
      transition: transform 0.1s;
    }
    button:active { transform: scale(0.98); }
    
    .btn-primary { background: #667eea; color: white; }
    .btn-primary:hover { background: #5568d3; }
    
    .btn-success { background: #48bb78; color: white; }
    .btn-success:hover { background: #38a169; }
    
    .btn-danger { background: #f56565; color: white; }
    .btn-danger:hover { background: #e53e3e; }
    
    .btn-secondary { background: #718096; color: white; }
    .btn-secondary:hover { background: #4a5568; }
    
    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 3px solid #f0f0f0;
    }
    
    table { 
      width: 100%; 
      border-collapse: collapse; 
      margin-top: 30px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0,0,0,0.05);
    }
    th { 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white; 
      padding: 16px; 
      text-align: left;
      font-weight: 600;
    }
    td { 
      padding: 14px 16px; 
      border-bottom: 1px solid #f0f0f0;
    }
    tr:hover { background: #f7fafc; }
    tr:last-child td { border-bottom: none; }
    
    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      background: #e6fffa;
      color: #047857;
    }
    
    .hidden { display: none; }
  </style>
</head>
<body>
  <div id="loginForm">
    <h2>Welcome Back</h2>
    <input id="username" placeholder="Username" value="admin">
    <input id="password" type="password" placeholder="Password" value="admin123">
    <button class="btn-primary" style="width: 100%;" onclick="login()">Login</button>
  </div>

  <div id="app" class="hidden">
    <div class="container">
      <div class="header-bar">
        <h2>Employee Management</h2>
        <button class="btn-secondary" onclick="logout()">Logout</button>
      </div>
      
      <h3>Add/Update Employee</h3>
      <div class="form-row">
        <input type="hidden" id="empId">
        <input id="name" placeholder="Full Name">
        <input id="email" placeholder="Email Address">
        <input id="position" placeholder="Job Position">
        <input id="salary" type="number" placeholder="Salary">
      </div>
      <button class="btn-success" onclick="saveEmployee()">Save Employee</button>
      <button class="btn-secondary" onclick="clearForm()">Clear Form</button>
      
      <table id="empTable">
        <thead>
          <tr>
            <th>ID</th><th>Name</th><th>Email</th><th>Position</th><th>Salary</th><th>Actions</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

<script>
let token = localStorage.getItem('token');
if (token) showApp();

async function login() {
  const res = await fetch('/api/login', {
    method: 'POST', 
    headers: {'Content-Type': 'application/json'}, 
    body: JSON.stringify({
      username: document.getElementById('username').value, 
      password: document.getElementById('password').value
    })
  });
  const data = await res.json();
  if (data.token) {
    localStorage.setItem('token', data.token); 
    token = data.token; 
    showApp();
  } else alert(data.error);
}

function logout() {
  localStorage.removeItem('token'); 
  location.reload();
}

function showApp() {
  document.getElementById('loginForm').classList.add('hidden'); 
  document.getElementById('app').classList.remove('hidden'); 
  loadEmployees();
}

async function loadEmployees() {
  const res = await fetch('/api/employees', {
    headers: {'Authorization': 'Bearer ' + token}
  });
  const employees = await res.json();
  const tbody = document.querySelector('#empTable tbody');
  tbody.innerHTML = employees.map(e => `
    <tr>
      <td><span class="badge">#${e.id}</span></td>
      <td><strong>${e.name}</strong></td>
      <td>${e.email}</td>
      <td>${e.position}</td>
      <td style="color: #48bb78; font-weight: 600;">$${e.salary.toLocaleString()}</td>
      <td>
        <button class="btn-primary" onclick='editEmployee(${JSON.stringify(e)})'>Edit</button>
        <button class="btn-danger" onclick='deleteEmployee(${e.id})'>Delete</button>
      </td>
    </tr>`).join('');
}

async function saveEmployee() {
  const id = document.getElementById('empId').value;
  const emp = {
    name: document.getElementById('name').value, 
    email: document.getElementById('email').value, 
    position: document.getElementById('position').value, 
    salary: document.getElementById('salary').value
  };
  const url = id? `/api/employees/${id}` : '/api/employees';
  const method = id? 'PUT' : 'POST';
  const res = await fetch(url, {
    method, 
    headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token}, 
    body: JSON.stringify(emp)
  });
  const data = await res.json();
  if (data.errors) alert(data.errors.map(e => e.msg).join('\n')); 
  else {clearForm(); loadEmployees();}
}

function editEmployee(e) {
  document.getElementById('empId').value = e.id; 
  document.getElementById('name').value = e.name; 
  document.getElementById('email').value = e.email; 
  document.getElementById('position').value = e.position; 
  document.getElementById('salary').value = e.salary;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function deleteEmployee(id) {
  if (!confirm('Delete this employee?')) return; 
  await fetch(`/api/employees/${id}`, {
    method: 'DELETE', 
    headers: {'Authorization': 'Bearer ' + token}
  }); 
  loadEmployees();
}

function clearForm() {
  document.getElementById('empId').value = ''; 
  document.getElementById('name').value = ''; 
  document.getElementById('email').value = ''; 
  document.getElementById('position').value = ''; 
  document.getElementById('salary').value = '';
}
</script>
</body>
</html>
